<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>枠付き横3列</title>

<style>
body{
  margin:0;
  padding:10px;
  font-family:sans-serif;
  font-size:12px;
}

.row{
  display:flex;
  gap:6px;
}

.column{
  flex:1;
  border:1px solid #aaa;
  border-radius:6px;
  padding:6px;
}

.column h4{
  text-align:center;
  margin:0 0 6px 0;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:4px;
}
.stats div{
  width:48%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

select{
  width:100%;
  padding:4px;
  font-size:12px;
  margin-bottom:4px;
}

.label{
  text-align:left;
  font-size:11px;
  background:#f3f3f3;
  padding:4px 0;
  margin-bottom:4px;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="row">

  <div class="column">
    <h4>大将</h4>
    <select><option>名前</option></select>

    <div class="label">C4,5凸,覚醒</div>
    <select><option>Lv50</option></select>
    <div class="stats">
      <div>武勇<input type="number" value="50"></div>
      <div>知略<input type="number" value="50"></div>
      <div>統率<input type="number" value="50"></div>
      <div>速度<input type="number" value="50"></div>
      <div>政務<input type="number" value="50"></div>
      <div>魅力<input type="number" value="50"></div>
    </div>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
    <div class="label">固有特性：弓兵の大将</div>
    <div class="label">特性1凸：</div>
    <div class="label">特性3凸：</div>
    <div class="label">特性5凸：</div>
    <select><option>兵学</option></select>
    <div class="label">兵学・奇</div>
    <select><option>兵学・奇</option></select>
    <div class="label">兵学・正</div>
    <select><option>兵学・正1</option></select>
    <select><option>兵学・正2</option></select>
    <select><option>兵学・正3</option></select>
  </div>

  <div class="column">
    <h4>副将1</h4>
    <select><option>名前</option></select>

    <div class="label">C4,5凸,覚醒</div>

    <select><option>Lv50</option></select>
    <div class="stats">
      <div>武勇<input type="number" value="50"></div>
      <div>知略<input type="number" value="50"></div>
      <div>統率<input type="number" value="50"></div>
      <div>速度<input type="number" value="50"></div>
      <div>政務<input type="number" value="50"></div>
      <div>魅力<input type="number" value="50"></div>
    </div>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
    <div class="label">固有特性：弓兵の大将</div>
    <div class="label">特性1凸：</div>
    <div class="label">特性3凸：</div>
    <div class="label">特性5凸：</div>
    <select><option>兵学</option></select>
    <div class="label">兵学・奇</div>
    <select><option>兵学・奇</option></select>
    <div class="label">兵学・正</div>
    <select><option>兵学・正1</option></select>
    <select><option>兵学・正2</option></select>
    <select><option>兵学・正3</option></select>
  </div>

  <div class="column">
    <h4>副将2</h4>
    <select><option>名前</option></select>

    <div class="label">C4,5凸,覚醒</div>

    <select><option>Lv50</option></select>
    <div class="stats">
      <div>武勇<input type="number" value="50"></div>
      <div>知略<input type="number" value="50"></div>
      <div>統率<input type="number" value="50"></div>
      <div>速度<input type="number" value="50"></div>
      <div>政務<input type="number" value="50"></div>
      <div>魅力<input type="number" value="50"></div>
    </div>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
    <div class="label">固有特性：弓兵の大将</div>
    <div class="label">特性1凸：</div>
    <div class="label">特性3凸：</div>
    <div class="label">特性5凸：</div>
    <select><option>兵学</option></select>
    <div class="label">兵学・奇</div>
    <select><option>兵学・奇</option></select>
    <div class="label">兵学・正</div>
    <select><option>兵学・正1</option></select>
    <select><option>兵学・正2</option></select>
    <select><option>兵学・正3</option></select>
  </div>

</div>

</body>
</html>
