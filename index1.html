<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>枠付き横3列</title>

<style>
body{
  margin:0;
  padding:10px;
  font-family:sans-serif;
  font-size:12px;
}

.row{
  display:flex;
  gap:6px;
}

.column{
  flex:1;
  border:1px solid #aaa;
  border-radius:6px;
  padding:6px;
  margin-bottom:2px;
}

.column h4{
  text-align:center;
  margin:0 0 6px 0;
}

.busho-grid{
  display:grid;
  grid-template-columns:  auto auto auto;
  gap:3px;
  margin-bottom:2px;
}

.attr-grid{
  display:grid;
  grid-template-columns:  65px auto;
  gap:3px;
  margin-bottom:2px;
  font-size:11px;
}

.attr-grid input{
  width:20px;
  font-size:11px;
  text-align:right;
}

.tokusei-grid{
  display:grid;
  grid-template-columns:  auto auto;
  gap:3px;
  margin-bottom:2px;
}

select{
  width:100%;
  padding:4px;
  font-size:12px;
  margin-bottom:4px;
}

.label{
  text-align:left;
  font-size:11px;
  background:#f3f3f3;
  padding:4px 0;
  margin-bottom:4px;
  border-radius:4px;
}

.label-center{
  text-align:center;
  font-size:11px;
  background:#f3f3f3;
  padding:4px 0;
  margin-bottom:4px;
  border-radius:4px;
}

</style>
</head>

<body>

<div class="row">

  <div class="column">
    <h4>大将</h4>
    <select><option>名前</option></select>
    <div class="busho-grid">
      <div class="label-center">C4</div>
      <div class="label-center">5凸</div>
      <div class="label-center">未覚醒</div>
    </div>  
    <select><option>Lv50</option></select>
    <div class="column">
      <div class="attr-grid">
        <div>属性</div><div> </div>
        <div>武勇300.00</div><input type="number" value="50">
        <div>知略300</div><input type="number" value="50">
        <div>統率300</div><input type="number" value="50">
        <div>速度300</div><input type="number" value="50">
        <div>政務300</div><input type="number" value="50">
        <div>魅力300</div><input type="number" value="50">
      </div>
    </div>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
    <div class="column">
        <div>特性</div>
        <div class="label">固有：弓兵の大将</div>
        <div class="label">1凸：</div>
        <div class="tokusei-grid">
          <div class="label">3凸：馬術Ⅱ</div>
          <div class="label">5凸：馬術Ⅲ</div>
      </div>
    </div>
    <select><option>兵学</option></select>
    <div class="label">兵学・奇</div>
    <select><option>兵学・奇</option></select>
    <div class="label">兵学・正</div>
    <select><option>兵学・正1</option></select>
    <select><option>兵学・正2</option></select>
    <select><option>兵学・正3</option></select>
  </div>

  <div class="column">
    <h4>副将1</h4>
    <select><option>名前</option></select>

    <div class="busho-grid">
      <div class="label-center">C4</div>
      <div class="label-center">5凸</div>
      <div class="label-center">未覚醒</div>
    </div>  
    <select><option>Lv50</option></select>
    <div class="column">
      <div class="attr-grid">
        <div>属性</div><div> </div>
        <div>武勇300.00</div><input type="number" value="50">
        <div>知略300</div><input type="number" value="50">
        <div>統率300</div><input type="number" value="50">
        <div>速度300</div><input type="number" value="50">
        <div>政務300</div><input type="number" value="50">
        <div>魅力300</div><input type="number" value="50">
      </div>
    </div>

    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
    <div class="label">固有特性：弓兵の大将</div>
    <div class="label">特性1凸：</div>
    <div class="label">特性3凸：</div>
    <div class="label">特性5凸：</div>
    <select><option>兵学</option></select>
    <div class="label">兵学・奇</div>
    <select><option>兵学・奇</option></select>
    <div class="label">兵学・正</div>
    <select><option>兵学・正1</option></select>
    <select><option>兵学・正2</option></select>
    <select><option>兵学・正3</option></select>
  </div>

  <div class="column">
    <h4>副将2</h4>
    <select><option>名前</option></select>

    <div class="busho-grid">
      <div class="label-center">C4</div>
      <div class="label-center">5凸</div>
      <div class="label-center">覚醒</div>
    </div>  
    <select><option>Lv50</option></select>
    <div class="column">
      <div class="attr-grid">
        <div>属性</div><div> </div>
        <div>武勇300.00</div><input type="number" value="50">
        <div>知略300</div><input type="number" value="50">
        <div>統率300</div><input type="number" value="50">
        <div>速度300</div><input type="number" value="50">
        <div>政務300</div><input type="number" value="50">
        <div>魅力300</div><input type="number" value="50">
      </div>
    </div>

    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
    <div class="label">固有特性：弓兵の大将</div>
    <div class="label">特性1凸：</div>
    <div class="label">特性3凸：</div>
    <div class="label">特性5凸：</div>
    <select><option>兵学</option></select>
    <div class="label">兵学・奇</div>
    <select><option>兵学・奇</option></select>
    <div class="label">兵学・正</div>
    <select><option>兵学・正1</option></select>
    <select><option>兵学・正2</option></select>
    <select><option>兵学・正3</option></select>
  </div>

</div>

</body>
</html>
