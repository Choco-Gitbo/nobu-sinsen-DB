<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>枠付き横3列</title>

<style>
body{
  margin:0;
  padding:10px;
  font-family:sans-serif;
  font-size:12px;
}

.row{
  display:flex;
  gap:6px;
}

.column{
  flex:1;
  border:1px solid #aaa;
  border-radius:6px;
  padding:6px;
}

.column h4{
  text-align:center;
  margin:0 0 6px 0;
}

select{
  width:100%;
  padding:4px;
  font-size:12px;
  margin-bottom:4px;
}

.label{
  text-align:center;
  font-size:11px;
  background:#f3f3f3;
  padding:4px 0;
  margin-bottom:4px;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="row">

  <div class="column">
    <h4>大将</h4>
    <select><option>名前</option></select>

    <div class="label">コスト：4　5凸</div>

    <select><option>Lv50</option></select>
    <select><option>覚醒</option></select>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
  </div>

  <div class="column">
    <h4>副将</h4>
    <select><option>名前</option></select>

    <div class="label">コスト：3.5　5凸</div>

    <select><option>Lv50</option></select>
    <select><option>覚醒</option></select>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
  </div>

  <div class="column">
    <h4>副将</h4>
    <select><option>名前</option></select>

    <div class="label">コスト：3　4凸</div>

    <select><option>Lv50</option></select>
    <select><option>覚醒</option></select>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
  </div>

</div>

</body>
</html>
