<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行揃え横3列テスト</title>

<style>
body{
  margin:0;
  padding:10px;
  font-family:sans-serif;
  font-size:12px;
}

.grid{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:4px;
  margin-bottom:6px;
}

.header{
  text-align:center;
  font-weight:bold;
}

select{
  width:100%;
  padding:4px;
  font-size:12px;
}

.label{
  text-align:center;
  font-size:11px;
  background:#f3f3f3;
  padding:4px 0;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="grid header">
  <div>大将</div>
  <div>副将</div>
  <div>副将</div>
</div>

<!-- 名前 -->
<div class="grid">
  <select><option>名前</option></select>
  <select><option>名前</option></select>
  <select><option>名前</option></select>
</div>

<!-- ★ 追加：コスト表示 -->
<div class="grid">
  <div class="label">コスト：4　5凸</div>
  <div class="label">コスト：3.5　5凸</div>
  <div class="label">コスト：3　4凸</div>
</div>

<!-- Lv -->
<div class="grid">
  <select><option>Lv50</option></select>
  <select><option>Lv50</option></select>
  <select><option>Lv50</option></select>
</div>

<!-- 覚醒 -->
<div class="grid">
  <select><option>覚醒</option></select>
  <select><option>覚醒</option></select>
  <select><option>覚醒</option></select>
</div>

</body>
</html>
