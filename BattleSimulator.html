<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="BattleSimulator.css">
    <title>戦闘シミュレーター</title>
</head>
<style>
  .team-a { color: #569cd6; font-weight: bold; } /* 青系 */
  .team-b { color: #f44747; font-weight: bold; } /* 赤系 */
  .senpo-name { color:yellow; font-weight: bold;}/* 戦法名はオレンジ系など */
  .heal { color:chartreuse; }   /* 緑系 */
</style>
<body>
    <div class="battle-setup">
    <label>自軍部隊: 
        <select id="select-team-a">
        </select>
    </label>
    
    <span> VS </span>

    <label>敵軍部隊: 
        <select id="select-team-b">
        </select>
    </label>

    
    </div>

    <div class="preview-wrapper"> <div class="team-panel team-a-panel">
            <div id="preview-a-unit-type" class="unit-label">騎兵</div>
            <table class="preview-table">
                <tr>
                    <th>大将</th>
                    <th>副将</th>
                    <th>副将</th>
                </tr>
                <tr>
                    <td ><input id="preview-a-0-hp" class = "input" type ="text" value = "10000"></input></td>
                    <td ><input id="preview-a-1-hp" class = "input"  type ="text" value = "10000"></input></td>
                    <td ><input id="preview-a-2-hp" class = "input"  type ="text" value = "10000"></input></td>
                </tr>
                <tr>
                    <td id="preview-a-0-name">大将名</td>
                    <td id="preview-a-1-name">副将名</td>
                    <td id="preview-a-2-name">副将名</td>
                </tr>

                <tr>
                    <td id="preview-a-0-s1">固有戦法</td>
                    <td id="preview-a-1-s1">固有戦法</td>
                    <td id="preview-a-2-s1">固有戦法</td>
                </tr>
                <tr>
                    <td id="preview-a-0-s2">戦法2</td>
                    <td id="preview-a-1-s2">戦法2</td>
                    <td id="preview-a-2-s2">戦法2</td>
                </tr>
                <tr>
                    <td id="preview-a-0-s3">戦法3</td>
                    <td id="preview-a-1-s3">戦法3</td>
                    <td id="preview-a-2-s3">戦法3</td>
                </tr>
            </table>
        </div>

        <div class="vs-icon">
            <button id="start-battle-btn"><h1>⚔️</h1></button>
        </div>

        <div class="team-panel team-b-panel"> <div id="preview-b-unit-type" class="unit-label">騎兵</div>
            <table class="preview-table">
                <tr>
                    <th>大将</th>
                    <th>副将</th>
                    <th>副将</th>
                </tr>
                <tr>
                    <td ><input id="preview-b-0-hp" class = "input" type ="text" value = "10000"></input></td>
                    <td ><input id="preview-b-1-hp" class = "input"  type ="text" value = "10000"></input></td>
                    <td ><input id="preview-b-2-hp" class = "input"  type ="text" value = "10000"></input></td>
                </tr>
                <tr>
                    <td id="preview-b-0-name">大将名</td>
                    <td id="preview-b-1-name">副将名</td>
                    <td id="preview-b-2-name">副将名</td>
                </tr>

                <tr>
                    <td id="preview-b-0-s1">固有戦法</td>
                    <td id="preview-b-1-s1">固有戦法</td>
                    <td id="preview-b-2-s1">固有戦法</td>
                </tr>
                <tr>
                    <td id="preview-b-0-s2">戦法2</td>
                    <td id="preview-b-1-s2">戦法2</td>
                    <td id="preview-b-2-s2">戦法2</td>
                </tr>
                <tr>
                    <td id="preview-b-0-s3">戦法3</td>
                    <td id="preview-b-1-s3">戦法3</td>
                    <td id="preview-b-2-s3">戦法3</td>
                </tr>
            </table>
        </div>

    </div>
        
    <div id="statistics-area">
        <label>集計結果 (全 <span id="stat-total-count">0</span> 戦)</label>
        
        <table class="summary-table main-stats">
            <thead>
                <tr>
                    <th>勝率</th>
                    <th>勝利</th>
                    <th>敗北</th>
                    <th>引分</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="stat-win-rate">0.0%</td>
                    <td id="stat-win-count">0</td>
                    <td id="stat-loss-count">0</td>
                    <td id="stat-draw-count">0</td>
                </tr>
            </tbody>
        </table>

        <div id="statistics-result">
            <label>部隊全体統計</label>
            <table class="summary-table">
                <tr>
                    <th>項目</th><th>最大</th><th>最小</th><th>平均</th>
                </tr>
                <tr id="team-total-damage"><td>与ダメージ</td><td class="max">-</td><td class="min">-</td><td class="avg">-</td></tr>
                <tr id="team-total-taken"><td>被ダメージ</td><td class="max">-</td><td class="min">-</td><td class="avg">-</td></tr>
                <tr id="team-total-heal"><td>回復量</td><td class="max">-</td><td class="min">-</td><td class="avg">-</td></tr>
            </table>

            <label>武将・戦法別詳細</label>
            <div id="busho-detail-container"></div>
        </div>
    </div>

    <div id="log-container" style="
        background: #1e1e1e; 
        color: #d4d4d4; 
        padding: 15px; 
        margin-top: 20px; 
        font-family: monospace; 
        white-space: pre-wrap; 
        height: 500px; 
        overflow-y: auto; 
        border: 1px solid #444;
        line-height: 1.5; /* ここを追加！ 1.5〜1.8くらいが読みやすいです */
        letter-spacing: 0.02em; /* ついでに文字間隔も少し広げるとさらに読みやすくなります */
        ">
    ここにログが表示されます
    </div>
<script type="module" src="./BS_main.js"></script></body>
</html>
