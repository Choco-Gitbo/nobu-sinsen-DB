<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="BattleSimulator.css">
    <title>戦闘シミュレーター</title>
</head>
<style>
  .team-a { color: #569cd6; font-weight: bold; } /* 青系 */
  .team-b { color: #f44747; font-weight: bold; } /* 赤系 */
  .senpo-name { color:yellow; font-weight: bold;}/* 戦法名はオレンジ系など */
  .heal { color:chartreuse; }   /* 緑系 */
</style>
<body>
    <div class="battle-setup">
    <label>自軍部隊: 
        <select id="select-team-a">
        </select>
    </label>
    
    <span> VS </span>

    <label>敵軍部隊: 
        <select id="select-team-b">
        </select>
    </label>

    
    </div>

    <div class="preview-area"> <div class="team-panel team-a-panel">
            <div id="preview-a-unit-type" class="unit-label">騎兵</div>
            <table class="preview-table">
                <tr>
                    <th>大将</th>
                    <th>副将</th>
                    <th>副将</th>
                </tr>
                <tr>
                    <td id="preview-a-0-name">大将名</td>
                    <td id="preview-a-1-name">副将名</td>
                    <td id="preview-a-2-name">副将名</td>
                </tr>

                <tr>
                    <td id="preview-a-0-s0">通常攻撃</td>
                    <td id="preview-a-1-s0">通常攻撃</td>
                    <td id="preview-a-2-s0">通常攻撃</td>
                </tr>
                <tr>
                    <td id="preview-a-0-s1">固有戦法</td>
                    <td id="preview-a-1-s1">固有戦法</td>
                    <td id="preview-a-2-s1">固有戦法</td>
                </tr>
                <tr>
                    <td id="preview-a-0-s2">戦法2</td>
                    <td id="preview-a-1-s2">戦法2</td>
                    <td id="preview-a-2-s2">戦法2</td>
                </tr>
                <tr>
                    <td id="preview-a-0-s3">戦法3</td>
                    <td id="preview-a-1-s3">戦法3</td>
                    <td id="preview-a-2-s3">戦法3</td>
                </tr>
            </table>
        </div>

        <div class="vs-icon">
            <button id="start-battle-btn"><h1>⚔️</h1></button>
        </div>

        <div class="team-panel team-b-panel"> <div id="preview-b-unit-type" class="unit-label">騎兵</div>
            <table class="preview-table">
                <tr>
                    <th>大将</th>
                    <th>副将</th>
                    <th>副将</th>
                </tr>
                <tr>
                    <td id="preview-b-0-name">大将名</td>
                    <td id="preview-b-1-name">副将名</td>
                    <td id="preview-b-2-name">副将名</td>
                </tr>

                <tr>
                    <td id="preview-b-0-s0">通常攻撃</td>
                    <td id="preview-b-1-s0">通常攻撃</td>
                    <td id="preview-b-2-s0">通常攻撃</td>
                </tr>
                <tr>
                    <td id="preview-b-0-s1">固有戦法</td>
                    <td id="preview-b-1-s1">固有戦法</td>
                    <td id="preview-b-2-s1">固有戦法</td>
                </tr>
                <tr>
                    <td id="preview-b-0-s2">戦法2</td>
                    <td id="preview-b-1-s2">戦法2</td>
                    <td id="preview-b-2-s2">戦法2</td>
                </tr>
                <tr>
                    <td id="preview-b-0-s3">戦法3</td>
                    <td id="preview-b-1-s3">戦法3</td>
                    <td id="preview-b-2-s3">戦法3</td>
                </tr>
            </table>
        </div>

    </div>
        
    <div class="simulator-wrapper">
        <section class="stats-panel">
            <div class="team-preview-grid">
            </div>
            
            <div class="summary-table">
            </div>
        </section>

        <section class="controls">
            <button id="run-single">1戦実行 (詳細ログあり)</button>
            <button id="run-multi">100戦連続実行 (統計のみ)</button>
        </section>

    </div>

    <div id="log-container" style="
        background: #1e1e1e; 
        color: #d4d4d4; 
        padding: 15px; 
        margin-top: 20px; 
        font-family: monospace; 
        white-space: pre-wrap; 
        height: 500px; 
        overflow-y: auto; 
        border: 1px solid #444;
        line-height: 1.8; /* ここを追加！ 1.5〜1.8くらいが読みやすいです */
        letter-spacing: 0.05em; /* ついでに文字間隔も少し広げるとさらに読みやすくなります */
        ">
    ここにログが表示されます
    </div>
<script type="module" src="./BS_main.js"></script></body>
</html>
