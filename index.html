<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>横3列テスト</title>

<style>
body {
  margin: 0;
  padding: 10px;
  font-family: sans-serif;
}

.container {
  display: flex;
  gap: 6px;
}

select {
  flex: 1;              /* 横幅を均等に */
  padding: 6px;
  font-size: 14px;
}
</style>
</head>

<body>

<h3>横3列プルダウンテスト</h3>

<div class="container">
  <select>
    <option>大将</option>
    <option>曹操</option>
    <option>劉備</option>
    <option>孫権</option>
  </select>

  <select>
    <option>副将1</option>
    <option>張飛</option>
    <option>夏侯惇</option>
  </select>

  <select>
    <option>副将2</option>
    <option>趙雲</option>
    <option>周瑜</option>
  </select>
</div>

</body>
</html>
