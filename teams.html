<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="teams.css">
<title>部隊編成</title>
</head>

<body>

<div class="row">

<!-- 大将 -->
<div class="column">
<h4>大将</h4>

<select class="busho-select"></select>

<div class="busho-grid">
  <div class="label-center">C</div>
  <div class="label-center">凸</div>
  <div class="label-center">覚醒</div>
</div>

<select>
<option>Lv50</option>
</select>

<div class="column collapsible-column">
<div class="column-title">属性</div>
<div class="attr-grid">
<div>武勇</div><input type="number" value="50">
<div>知略</div><input type="number" value="50">
<div>統率</div><input type="number" value="50">
<div>速度</div><input type="number" value="50">
<div>政務</div><input type="number" value="50">
<div>魅力</div><input type="number" value="50">
</div>

</div>

<div class="senpo1"></div> <!-- 選択した武将の固有戦法 -->
<select class="senpo2"></select>
<select class="senpo3"></select>

<div class="column">
<div>特性</div>

<div class="label tokusei-koyu"></div> <!-- 選択した武将の固有特性 -->
<div class="label">1：</div> <!-- 選択した武将の1凸特性 -->
<div class="tokusei-grid"></div>
  <div class="label"></div> <!-- 選択した武将の3凸特性 -->
  <div class="label"></div> <!-- 選択した武将の5凸特性 -->
</div>

<div class="column">

<select class="heigaku-type"></select>

<div class="label">兵学・奇</div>
<select class="heigaku-ki"></select>

<div class="heigaku-grid">
<div class="label">兵学・正</div>
<select class="heigaku-sei1"></select>
</div>

<div class="heigaku-grid">
<select class="heigaku-sei2"></select>
<select class="heigaku-sei3"></select>
</div>

</div>

<div class="column collapsible-column">

<div class="column-title">タグ</div>

<div class="tag-grid"></div>

</div>

</div>
