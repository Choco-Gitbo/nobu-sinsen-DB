<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="teams.css">
<title>枠付き横3列</title>

<style>

<body>

<div class="row">

  <div class="column">
    <h4>大将</h4>
    <select><option>名前</option></select>
    <div class="busho-grid">
      <div class="label-center">C4</div>

      <div class="label-center">未覚醒</div>
    </div>  
    <select><option>Lv50</option></select>
    <div class="column collapsible-column">
      <div class="column-title">属性</div> <div class="attr-grid">

        <div>知略300</div><input type="number" value="50">

        <div>魅力300</div><input type="number" value="50">
      </div>
    </div>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
    <div class="column">
        <div>特性</div>

        <div class="label">1：</div>
        <div class="tokusei-grid">
          <div class="label">馬術Ⅱ</div>

        </div>
    </div>

      <select><option>兵学</option></select>
      <div class="label">兵学・奇</div>
      <select><option>兵学・奇</option></select>
      <div class="heigaku-grid">
        <div class="label">兵学・正</div>
        <select><option>剛力</option></select>
      </div>
      <div class="heigaku-grid">
        <select><option>豪勇</option></select>
        <select><option>活路</option></select>
      </div>
    </div>
  </div>

  <div class="column">
    <h4>副将1</h4>
    <select><option>名前</option></select>
    <div class="busho-grid">
      <div class="label-center">C4</div>
      <div class="label-center">5凸</div>
      <div class="label-center">未覚醒</div>
    </div>  
    <select><option>Lv50</option></select>
    <div class="column collapsible-column">
      <div class="column-title">属性</div> <div class="attr-grid">
        <div>武勇300.00</div><input type="number" value="50">
        <div>知略300</div><input type="number" value="50">
        <div>統率300</div><input type="number" value="50">
        <div>速度300</div><input type="number" value="50">
        <div>政務300</div><input type="number" value="50">
        <div>魅力300</div><input type="number" value="50">
      </div>
    </div>
    <select><option>戦法2</option></select>
    <select><option>戦法3</option></select>
    <div class="column">
        <div>特性</div>
        <div class="label">固有：弓兵の大将</div>
        <div class="label">1：</div>
        <div class="tokusei-grid">
          <div class="label">馬術Ⅱ</div>
          <div class="label">馬術Ⅲ</div>
        </div>
    </div>

    <div class="column">
      <select><option>兵学</option></select>
      <div class="label">兵学・奇</div>
      <select><option>兵学・奇</option></select>
      <div class="heigaku-grid">

      <div class="heigaku-grid">

    <h4>副将2</h4>

    <div class="busho-grid">
      <div class="label-center">C4</div>
      <div class="label-center">5凸</div>
      <div class="label-center">覚醒</div>
    </div>  
    <select><option>Lv50</option></select>
    <div class="column collapsible-column">
      <div class="column-title">属性</div> <div class="attr-grid">
        <div>武勇300.00</div><input type="number" value="50">

        <select><option>活路</option></select>
      </div>
    </div>
  </div>

</div>

<script>
document.querySelectorAll('.collapsible-column').forEach(column => {
  column.addEventListener('click', function(e) {
    // inputタグなどをクリックした時は折りたたまないようにする
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
      return;
    }
    
    // 中身のグリッド（attr-grid）を探してクラスを切り替える
    const content = this.querySelector('.attr-grid');
    if (content) {
      content.classList.toggle('is-hidden');
    }
  });
});
</script>
