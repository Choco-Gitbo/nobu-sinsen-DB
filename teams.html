<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="teams.css">
<title>部隊編成</title>
</head>

<body>

<div class="top-tabs">
  <button id="goBushoList">武将・戦法名鑑</button>
  <div class="team-preset-buttons"></div>
</div>

  

<div class="team-container">
  <div class="unit-group">
    <div class="team-label">兵種：</div>
    <select class="unit-select"></select>
  </div>

  <div class="cost-group">
    <div class="team-label">Cost：</div>
    <div class="nowcost">0</div>
    <div>/</div>
    <select class="maxcost"></select>
  </div>

  <div class="name-group">
    <div class="team-label">部隊名：</div>
    <input type="text" class="unit-name" placeholder="部隊名を入力">
  </div>

</div>

<div class="row">

  <!-- 大将 -->
  <div class="team">
    <h4>大将</h4>

    <select class="busho-select"></select>

    <div class="busho-grid">
      <div class="label-center">C</div>
      <div class="label-center">凸</div>
      <div class="label-center">覚醒</div>
    </div>

    <div class="column collapsible-column">
      <div class="column-title">属性(Lv50時)</div>  
      <!-- <select class="select-Lv"></select> -->
      <div class="attr-grid">
        <div>武勇</div><input class ="input-buyu" type="number" value="0">
        <div>知略</div><input class ="input-tiryaku" type="number" value="0">
        <div>統率</div><input class ="input-tosotsu" type="number" value="0">
        <div>速度</div><input class ="input-sokudo" type="number" value="0">
        <div>政務</div><input class ="input-seimu" type="number" value="0">
        <div>魅力</div><input class ="input-miryoku" type="number" value="0">
      </div>
    </div>

    <div class="senpo1"></div> <!-- 選択した武将の固有戦法 -->
    <select class="senpo-select senpo2"></select>
    <select class="senpo-select senpo3"></select>

    <div class="column">
    <div>特性</div>
    <div class="tokusei0"></div> <!-- 選択した武将の固有特性 -->
    <div class="tokusei1"></div> <!-- 選択した武将の1凸特性 -->
      <div class="tokusei-grid">
        <div class="tokusei3"></div> <!-- 選択した武将の3凸特性 -->
        <div class="tokusei5"></div> <!-- 選択した武将の5凸特性 -->
      </div>
    </div>

    <div class="column">
      <select class="heigaku-type"></select>
      <div class="label">兵学・奇</div>
      <select class="heigaku-ki"></select>

      <div class="heigaku-grid">
        <div class="label">兵学・正</div>
        <select class="heigaku-sei1"></select>
      </div>
      <div class="heigaku-grid">
        <select class="heigaku-sei2"></select>
        <select class="heigaku-sei3"></select>
      </div>

    </div>

    <div class="column collapsible-column">
      <div class="column-title">タグ</div>
      <div class="tag-grid"></div>
    </div>

  </div>

  <!-- 副将1 -->
  <div class="team">
    <h4>副将1</h4>

    <select class="busho-select"></select>

    <div class="busho-grid">
      <div class="label-center">C</div>
      <div class="label-center">凸</div>
      <div class="label-center">覚醒</div>
    </div>

    <div class="column collapsible-column">
      <div class="column-title">属性(Lv50時)</div>
      <!-- <select class="select-Lv"></select> -->
        <div class="attr-grid">
        <div>武勇</div><input class ="input-buyu" type="number" value="0">
        <div>知略</div><input class ="input-tiryaku" type="number" value="0">
        <div>統率</div><input class ="input-tosotsu" type="number" value="0">
        <div>速度</div><input class ="input-sokudo" type="number" value="0">
        <div>政務</div><input class ="input-seimu" type="number" value="0">
        <div>魅力</div><input class ="input-miryoku" type="number" value="0">
      </div>
    </div>

    <div class="senpo1"></div> <!-- 選択した武将の固有戦法 -->
    <select class="senpo-select senpo2"></select>
    <select class="senpo-select senpo3"></select>

    <div class="column">
    <div>特性</div>
    <div class="tokusei0"></div> <!-- 選択した武将の固有特性 -->
    <div class="tokusei1"></div> <!-- 選択した武将の1凸特性 -->
      <div class="tokusei-grid">
        <div class="tokusei3"></div> <!-- 選択した武将の3凸特性 -->
        <div class="tokusei5"></div> <!-- 選択した武将の5凸特性 -->
      </div>
    </div>

    <div class="column">
      <select class="heigaku-type"></select>
      <div class="label">兵学・奇</div>
      <select class="heigaku-ki"></select>

      <div class="heigaku-grid">
        <div class="label">兵学・正</div>
        <select class="heigaku-sei1"></select>
      </div>
      <div class="heigaku-grid">
        <select class="heigaku-sei2"></select>
        <select class="heigaku-sei3"></select>
      </div>

    </div>

    <div class="column collapsible-column">
      <div class="column-title">タグ</div>
      <div class="tag-grid"></div>
    </div>

  </div>

  <!-- 副将2 -->
  <div class="team">
    <h4>副将2</h4>

    <select class="busho-select"></select>

    <div class="busho-grid">
      <div class="label-center">C</div>
      <div class="label-center">凸</div>
      <div class="label-center">覚醒</div>
    </div>

    <div class="column collapsible-column">
      <div class="column-title">属性(Lv50時)</div>
      <!-- <select class="select-Lv"></select> -->
      <div class="attr-grid">
        <div>武勇</div><input class ="input-buyu" type="number" value="0">
        <div>知略</div><input class ="input-tiryaku" type="number" value="0">
        <div>統率</div><input class ="input-tosotsu" type="number" value="0">
        <div>速度</div><input class ="input-sokudo" type="number" value="0">
        <div>政務</div><input class ="input-seimu" type="number" value="0">
        <div>魅力</div><input class ="input-miryoku" type="number" value="0">
      </div>
    </div>

    <div class="senpo1"></div> <!-- 選択した武将の固有戦法 -->
    <select class="senpo-select senpo2"></select>
    <select class="senpo-select senpo3"></select>

    <div class="column">
    <div>特性</div>
    <div class="tokusei0"></div> <!-- 選択した武将の固有特性 -->
    <div class="tokusei1"></div> <!-- 選択した武将の1凸特性 -->
      <div class="tokusei-grid">
        <div class="tokusei3"></div> <!-- 選択した武将の3凸特性 -->
        <div class="tokusei5"></div> <!-- 選択した武将の5凸特性 -->
      </div>
    </div>

    <div class="column">
      <select class="heigaku-type"></select>
      <div class="label">兵学・奇</div>
      <select class="heigaku-ki"></select>

      <div class="heigaku-grid">
        <div class="label">兵学・正</div>
        <select class="heigaku-sei1"></select>
      </div>
      <div class="heigaku-grid">
        <select class="heigaku-sei2"></select>
        <select class="heigaku-sei3"></select>
      </div>

    </div>

    <div class="column collapsible-column">
      <div class="column-title">タグ</div>
      <div class="tag-grid"></div>
    </div>

  </div>
</div>

<div class="column collapsible-column">
<div class="column-title">選択絞込条件</div>
  <div class="select-filter">
    <div class="column">
      <div>武将絞込</div>
      <div>陣営</div><select class="busho-faction"></select>
      <div>コスト</div><select class="busho-cost"></select>
    </div>
    <div class="column">
      <div>戦法絞込</div>
      <div>戦法種類</div><select class="senpo-type"></select>
      <div>戦法状態</div><select class="senpo-state"></select>
    </div>
    <div class="column">
      <div>選択対象</div>
      <select class="list-mode">
        <option value="all">全て</option>
        <option value="owned">登録のみ</option>
      </select>
    </div>
  </div>
</div>


<script src="teams.js"></script>

</body>
</html>
