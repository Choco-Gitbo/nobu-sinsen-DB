<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="teams1.css">
<title>部隊編成</title>
</head>

<body>
    <div class="row team">
        <div class="column-unit">
            <select name="select unit-Type">
                <option value="">兵種</option>
                <option value="">騎兵</option>
                <option value="">弓兵</option>
                <option value="">鉄砲</option>
                <option value="">足軽</option>
                <option value="">兵器</option>
            </select>
            <div class="nowCost">C0</div>
        </div>
        <div class=" row-busho busho">
            <div class="row-busho-basic">
                <div class="column-cost cost-rank">
                    <div class="cost">C0</div>
                    <div class="rank">R0</div>
                </div>
                <select name="select busho-name">
                    <option value="">長宗我部元親</option>
                    <option value="">長宗我部信親</option>
                </select>
                <div class="column-senpo">
                    <select name="select senpo">
                        <option value="">東国無双の麗</option>
                        <option value="">天下無双</option>
                    </select>
                    <select name="select senpo">
                        <option value="">東国無双の麗</option>
                        <option value="">天下無双</option>
                    </select>
                </div>
            </div>
            <div class="row-heigaku heigaku">
                <select name="select heigaku-type">
                    <option value="">兵学</option>
                    <option value="">武略</option>
                    <option value="">機略</option>
                    <option value="">陣立</option>
                    <option value="">臨戦</option>
                </select>
                <div class="column-heigaku">
                    <div class="row">
                        <div class="label">奇</div>
                        <select name="select heigaku-ki">
                            <option value="">兵学・奇</option>
                            <option value="">返り討ちの計</option>
                            <option value="">機略</option>
                            <option value="">陣立</option>
                            <option value="">臨戦</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="label">正</div>
                        <select name="select heigaku-sei">
                            <option value=""></option>
                            <option value="">武略</option>
                            <option value="">機略</option>
                            <option value="">陣立</option>
                            <option value="">臨戦</option>
                        </select>
                        <select name="select heigaku-sei">
                            <option value=""></option>
                            <option value="">武略</option>
                            <option value="">機略</option>
                            <option value="">陣立</option>
                            <option value="">臨戦</option>
                        </select>
                        <select name="select heigaku-sei">
                            <option value=""></option>
                            <option value="">武略</option>
                            <option value="">機略</option>
                            <option value="">陣立</option>
                            <option value="">臨戦</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
