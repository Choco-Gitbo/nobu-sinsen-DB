<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="teams1.css">
<title>部隊編成</title>
</head>

<body>

<!--サイドメニュー-->
<button class="js-menu-open">≡</button>
<button class="btn" id="teamLoad-btn">登録編成読出</button>

<nav class="side-menu js-side-menu">
  <button class="js-menu-close">閉じる</button>
  <ul>
    <li>選択対象</li>
        <select class="own-mode">
            <option value="all">全て</option>
            <option value="owned">所持登録のみ</option>
        </select>
    <li>武将絞込</li>
    <ul>
        <li>陣営</li>
            <select class="busho-faction filter-b">
                <option value="">全て</option>
                <option value="織田">織田</option>
                <option value="豊臣">豊臣</option>
                <option value="徳川">徳川</option>
                <option value="武田">武田</option>
                <option value="上杉">上杉</option>
                <option value="群雄">群雄</option>
            </select>
        <li>コスト</li>
            <select class="busho-cost filter-b">
                <option value="">全て</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
            </select>
        <li>固有戦法種類</li>
            <select class="usenpo-type filter-b">
                <option value="">全て</option>
                <option value="指揮">指揮</option>
                <option value="能動">能動</option>
                <option value="突撃">突撃</option>
                <option value="受動">受動</option>
                <option value="兵種">兵種</option>
            </select>
        <li>固有戦法状態</li>
            <select class="usenpo-states filter-b">
                <option value="">全て</option>
            </select>
    </ul>
    <li>戦法絞込</li>
    <ul>
        <li>戦法種類</li>
            <select class="senpo-type filter-s">
                <option value="">全て</option>
                <option value="指揮">指揮</option>
                <option value="能動">能動</option>
                <option value="突撃">突撃</option>
                <option value="受動">受動</option>
                <option value="兵種">兵種</option>
            </select>
        <li>戦法状態</li>
            <select class="senpo-states filter-s">
                <option value="">全て</option>
            </select>
    </ul>
  </ul>
</nav>

<div class="menu-overlay js-menu-overlay"></div>
<!--サイドメニューここまで-->

<!--状態表示詳細-->
<div id="status-popup" class="popup-overlay" style="display: none;">
  <div class="popup-content">
    <h4>固有戦法状態</h4>
    <div id="popup-tags-list-unique"></div>
    <h4>第2戦法状態</h4>
    <div id="popup-tags-list-senpo2"></div>
    <h4>第3戦法状態</h4>
    <div id="popup-tags-list-senpo3"></div>
    <button id="close-popup-btn">閉じる</button>
  </div>
</div>

<table id="squad-table" border="1">
  <thead>
    <tr>
      <th>No</th>
      <th>兵種</th>
      <th>C/R</th>
      <th>武将名</th>
      <th>戦法名</th>
      <th colspan="3" class="heigaku">兵学</th>
      <th class="tokusei">特性</th>
      <th class="states">状態</th>
      <th class="tags">タグ</th>
    </tr>    
  </thead>
